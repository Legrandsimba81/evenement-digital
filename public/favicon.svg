<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F81E8" />
      <stop offset="100%" stop-color="#5658CB" />
    </linearGradient>
  </defs>
  <!-- Cercle de fond arrondi -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)" />
  <!-- Étincelle (Sparkles) stylisée -->
  <g transform="translate(50,50)" fill="white">
    <!-- Corps central (diamant) -->
    <rect x="-6" y="-14" width="12" height="28" rx="2" />
    <rect x="-14" y="-6" width="28" height="12" rx="2" />
    <!-- Quatre pointes extérieures -->
    <rect x="-3" y="-22" width="6" height="8" rx="1" />
    <rect x="-3" y="14" width="6" height="8" rx="1" />
    <rect x="-22" y="-3" width="8" height="6" rx="1" />
    <rect x="14" y="-3" width="8" height="6" rx="1" />
  </g>
</svg>